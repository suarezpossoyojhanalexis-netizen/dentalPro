<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalPro - {% block title %}Gestión Odontológica{% endblock %}</title>
    {% load static %}
    <!-- Tailwind y HTMX cargados desde archivos locales para funcionar sin internet -->
    <script src="{% static 'tailwind/tailwind.min.js' %}"></script>
    <script src="{% static 'htmx/htmx.min.js' %}"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    <!-- Barra de navegación principal -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'pacientes:lista' %}" class="text-2xl font-bold text-sky-700 tracking-tight">
                    🦷 DentalPro
                </a>
                <a href="{% url 'pacientes:crear' %}" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    + Nuevo Paciente
                </a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Mensajes de confirmación (crear, editar, eliminar) -->
        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm font-medium {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200{% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
