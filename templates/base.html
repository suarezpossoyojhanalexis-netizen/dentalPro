<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalPro - {% block title %}Gestión Odontológica{% endblock %}</title>
    {% load static %}
    <script src="{% static 'tailwind/tailwind.min.js' %}"></script>
    <script src="{% static 'htmx/htmx.min.js' %}"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'pacientes:lista' %}" class="text-2xl font-bold text-sky-700 tracking-tight">
                    🦷 DentalPro
                </a>
                <a href="{% url 'pacientes:crear' %}" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    + Nuevo Paciente
                </a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
