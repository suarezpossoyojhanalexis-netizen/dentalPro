{% extends 'base.html' %}
{% block title %}Eliminar Paciente{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto text-center">
    <div class="bg-white rounded-xl shadow-sm border p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">¿Eliminar paciente?</h1>
        <p class="text-gray-600 mb-6">
            Se desactivará a <strong>{{ patient.last_name }}, {{ patient.first_name }}</strong>
            ({{ patient.cedula }}). No se borrarán sus datos.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    Sí, eliminar
                </button>
                <a href="{% url 'pacientes:detalle' patient.pk %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
